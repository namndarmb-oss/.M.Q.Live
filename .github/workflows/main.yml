name: Build APK with Python

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython wheel

      - name: 🔧 Setup Buildozer
        run: |
          buildozer init
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.api = .*/android.api = 34/' buildozer.spec
          sed -i 's/android.minapi = .*/android.minapi = 26/' buildozer.spec

      - name: 🛠️ Build APK
        run: buildozer android debug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-APK
          path: bin/*.apk
          retention-days: 90
